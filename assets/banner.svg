<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180" width="100%">
  <defs>
    <!-- Gradient background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <!-- Circuit glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Emerald glow for accent -->
    <filter id="glow-emerald" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Animated circuit lines -->
  <g stroke-width="1.5" fill="none" opacity="0.6">
    <!-- Top circuit -->
    <path d="M -10,40 L 80,40 L 100,20 L 200,20" stroke="#334155">
      <animate attributeName="stroke-dasharray" values="0,300;300,0" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="stroke-dashoffset" values="300;0" dur="3s" repeatCount="indefinite"/>
    </path>
    <circle cx="200" cy="20" r="3" fill="#10b981" filter="url(#glow-emerald)">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- Mid-left circuit -->
    <path d="M -10,90 L 120,90 L 140,70 L 280,70" stroke="#475569">
      <animate attributeName="stroke-dasharray" values="0,400;400,0" dur="4s" repeatCount="indefinite" begin="0.5s"/>
      <animate attributeName="stroke-dashoffset" values="400;0" dur="4s" repeatCount="indefinite" begin="0.5s"/>
    </path>
    <circle cx="280" cy="70" r="3" fill="#3b82f6" filter="url(#glow)">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
    </circle>

    <!-- Bottom circuit -->
    <path d="M -10,140 L 60,140 L 80,160 L 180,160" stroke="#334155">
      <animate attributeName="stroke-dasharray" values="0,300;300,0" dur="3.5s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="stroke-dashoffset" values="300;0" dur="3.5s" repeatCount="indefinite" begin="1s"/>
    </path>
    <circle cx="180" cy="160" r="3" fill="#f43f5e" filter="url(#glow)">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite" begin="1s"/>
    </circle>

    <!-- Right-side circuits -->
    <path d="M 810,30 L 720,30 L 700,50 L 600,50" stroke="#334155">
      <animate attributeName="stroke-dasharray" values="0,300;300,0" dur="3.2s" repeatCount="indefinite" begin="1.5s"/>
      <animate attributeName="stroke-dashoffset" values="300;0" dur="3.2s" repeatCount="indefinite" begin="1.5s"/>
    </path>
    <circle cx="600" cy="50" r="3" fill="#10b981" filter="url(#glow-emerald)">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" begin="1.5s"/>
    </circle>

    <path d="M 810,90 L 680,90 L 660,110 L 520,110" stroke="#475569">
      <animate attributeName="stroke-dasharray" values="0,400;400,0" dur="4.5s" repeatCount="indefinite" begin="2s"/>
      <animate attributeName="stroke-dashoffset" values="400;0" dur="4.5s" repeatCount="indefinite" begin="2s"/>
    </path>
    <circle cx="520" cy="110" r="3" fill="#3b82f6" filter="url(#glow)">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.2s" repeatCount="indefinite" begin="2s"/>
    </circle>

    <path d="M 810,150 L 740,150 L 720,130 L 620,130" stroke="#334155">
      <animate attributeName="stroke-dasharray" values="0,300;300,0" dur="3.8s" repeatCount="indefinite" begin="2.5s"/>
      <animate attributeName="stroke-dashoffset" values="300;0" dur="3.8s" repeatCount="indefinite" begin="2.5s"/>
    </path>
    <circle cx="620" cy="130" r="3" fill="#f43f5e" filter="url(#glow)">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.7s" repeatCount="indefinite" begin="2.5s"/>
    </circle>
  </g>

  <!-- Center content -->
  <g text-anchor="middle">
    <!-- Bot icon (lucide-react) -->
    <g transform="translate(381, 34) scale(1.6)" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-emerald)">
      <g>
        <animateTransform attributeName="transform" type="scale" values="1;1.05;1" dur="3s" repeatCount="indefinite" additive="sum"/>
        <path d="M12 8V4H8" />
        <rect width="16" height="12" x="4" y="8" rx="2" />
        <path d="M2 14h2" />
        <path d="M20 14h2" />
        <path d="M15 13v2" />
        <path d="M9 13v2" />
      </g>
    </g>

    <!-- Title -->
    <text x="400" y="98" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="700" fill="#f8fafc" letter-spacing="1">
      CYBERNETICS
      <animate attributeName="opacity" values="0.95;1;0.95" dur="4s" repeatCount="indefinite"/>
    </text>

    <!-- Subtitle -->
    <text x="400" y="120" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="400" fill="#94a3b8" letter-spacing="3">
      COMPOSABLE META-MCP FOR GOOGLE CLOUD AGENTS
      <animate attributeName="opacity" values="0.7;1;0.7" dur="4s" repeatCount="indefinite" begin="0.5s"/>
    </text>

    <!-- Version line -->
    <text x="400" y="142" font-family="monospace" font-size="11" fill="#475569">
      v0.1.1  •  20 Adapters  •  80+ Tools  •  Agent Composer
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3s" repeatCount="indefinite" begin="1s"/>
    </text>
  </g>

  <!-- Floating particles -->
  <g fill="#10b981" opacity="0.4">
    <circle cx="50" cy="30" r="1.5">
      <animate attributeName="cy" values="30;150;30" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="160" r="1">
      <animate attributeName="cy" values="160;20;160" dur="10s" repeatCount="indefinite" begin="2s"/>
      <animate attributeName="opacity" values="0;0.5;0" dur="10s" repeatCount="indefinite" begin="2s"/>
    </circle>
    <circle cx="650" cy="40" r="2">
      <animate attributeName="cy" values="40;170;40" dur="9s" repeatCount="indefinite" begin="4s"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="9s" repeatCount="indefinite" begin="4s"/>
    </circle>
    <circle cx="750" cy="150" r="1.5">
      <animate attributeName="cy" values="150;30;150" dur="7s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="opacity" values="0;0.5;0" dur="7s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="350" cy="170" r="1">
      <animate attributeName="cy" values="170;10;170" dur="11s" repeatCount="indefinite" begin="3s"/>
      <animate attributeName="opacity" values="0;0.4;0" dur="11s" repeatCount="indefinite" begin="3s"/>
    </circle>
  </g>

  <!-- Bottom divider -->
  <line x1="200" y1="170" x2="600" y2="170" stroke="#10b981" stroke-width="1" opacity="0.3" filter="url(#glow-emerald)">
    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="3s" repeatCount="indefinite"/>
  </line>
</svg>
