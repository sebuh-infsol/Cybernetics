steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/cybernetics-broker:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/cybernetics-broker:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/cybernetics-broker:$SHORT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/cybernetics-broker:latest'

  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'cybernetics-broker'
      - '--image'
      - 'gcr.io/$PROJECT_ID/cybernetics-broker:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--service-account'
      - 'cybernetics-broker@$PROJECT_ID.iam.gserviceaccount.com'
      - '--no-allow-unauthenticated'
      - '--set-secrets'
      - 'GOOGLE_CLOUD_PROJECT=projects/$PROJECT_ID/secrets/gcp-project:latest'
      - '--set-secrets'
      - 'GEMINI_API_KEY=projects/$PROJECT_ID/secrets/gemini-api-key:latest'
      - '--set-secrets'
      - 'MONGODB_URI=projects/$PROJECT_ID/secrets/mongodb-uri:latest'
      - '--set-secrets'
      - 'ELASTIC_CLOUD_ID=projects/$PROJECT_ID/secrets/elastic-cloud-id:latest'
      - '--set-secrets'
      - 'ELASTIC_API_KEY=projects/$PROJECT_ID/secrets/elastic-api-key:latest'
      - '--set-secrets'
      - 'DYNATRACE_API_TOKEN=projects/$PROJECT_ID/secrets/dynatrace-api-token:latest'
      - '--set-secrets'
      - 'GITLAB_TOKEN=projects/$PROJECT_ID/secrets/gitlab-token:latest'
      - '--set-secrets'
      - 'ARIZE_API_KEY=projects/$PROJECT_ID/secrets/arize-api-key:latest'
      - '--set-secrets'
      - 'FIVETRAN_API_KEY=projects/$PROJECT_ID/secrets/fivetran-api-key:latest'
      - '--set-secrets'
      - 'FIVETRAN_API_SECRET=projects/$PROJECT_ID/secrets/fivetran-api-secret:latest'
      - '--set-secrets'
      - 'GITHUB_TOKEN=projects/$PROJECT_ID/secrets/github-token:latest'
      - '--set-secrets'
      - 'STRIPE_API_KEY=projects/$PROJECT_ID/secrets/stripe-api-key:latest'
      - '--set-secrets'
      - 'AWS_ACCESS_KEY_ID=projects/$PROJECT_ID/secrets/aws-access-key-id:latest'
      - '--set-secrets'
      - 'AWS_SECRET_ACCESS_KEY=projects/$PROJECT_ID/secrets/aws-secret-access-key:latest'
      - '--set-secrets'
      - 'VERCEL_TOKEN=projects/$PROJECT_ID/secrets/vercel-token:latest'
      - '--set-secrets'
      - 'SUPABASE_URL=projects/$PROJECT_ID/secrets/supabase-url:latest'
      - '--set-secrets'
      - 'SUPABASE_KEY=projects/$PROJECT_ID/secrets/supabase-key:latest'
      - '--set-secrets'
      - 'CLOUDFLARE_API_TOKEN=projects/$PROJECT_ID/secrets/cloudflare-api-token:latest'
      - '--set-secrets'
      - 'BROKER_API_KEY=projects/$PROJECT_ID/secrets/broker-api-key:latest'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      - '--max-instances'
      - '10'
      - '--min-instances'
      - '1'
      - '--timeout'
      - '300'

images:
  - 'gcr.io/$PROJECT_ID/cybernetics-broker:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/cybernetics-broker:latest'
